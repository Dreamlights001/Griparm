name: griparm_libero
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip>=24.0
  - ffmpeg
  - libstdcxx-ng
  - libgcc-ng
  - pip:
      # MuJoCo / robosuite backend
      - mujoco>=3.2.0
      - robosuite==1.5.2
      - glfw>=2.10
      - PyOpenGL>=3.1.0

      # Numeric / config
      - numpy>=2.0,<2.3
      - PyYAML>=6.0
      - tqdm>=4.66
      - packaging>=23.0

      # Image / video / parquet
      - av>=12.0
      - imageio-ffmpeg>=0.5.0
      - opencv-python-headless>=4.10.0
      - pillow>=10.0
      - pandas>=2.0
      - pyarrow>=15.0

      # LeRobot data format
      - lerobot>=0.1.0
      - lerobot-dataset>=0.4.0
      - datasets>=3.0.0
      - huggingface-hub>=0.20.0
      - torch>=2.0.0
